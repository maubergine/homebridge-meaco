name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please include a log excerpt from Homebridge with `debug_logging: true` enabled.
  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
    validations:
      required: true
  - type: input
    id: hb_version
    attributes:
      label: Homebridge version
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node version
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device model
  - type: textarea
    id: config
    attributes:
      label: Plugin config (redact credentials)
  - type: textarea
    id: logs
    attributes:
      label: Log excerpt (debug_logging enabled)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
